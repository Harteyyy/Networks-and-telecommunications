<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <title>Корзина - Сети и телекоммуникации</title>
</head>
<body>
    <!-- Хедер -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <img class="logo" src="img/logo.png" alt="Логотип">
            </a>
            
            <nav class="menu">
                <a class="menu-item" href="index.html">Главная</a>
                <a class="menu-item" href="about-course.html">О курсе</a>
                <a class="menu-item" href="contacts.html">Контакты</a>
                <a class="menu-item" href="reviews.html">Отзывы</a>
            </nav>
            
            <div class="header-actions">
                <a href="register.html" class="cabinet">
                    <img class="kabinet-icon" src="img/kabinet.png" alt="Личный кабинет">
                </a>
                <a href="Korzina.html" class="cart-link">
                    <img class="cart-icon" src="img/korzina.png" alt="Корзина">
                    <span class="cart-badge" id="header-cart-counter">0</span>
                </a>
            </div>
        </div>
    </header>

        <main class="main">
        <!-- Корзина -->
        <section class="cart-section">
            <div class="cart-container">
                <!-- Заголовок корзины с динамическим счетчиком -->
                <h1 class="cart-title">Моя корзина(<span id="cart-counter">0</span>)</h1>
                
                <div class="cart-layout">
                    <!-- Контейнер для товаров в корзине -->
                    <div class="cart-items" id="cart-items"></div>
                    
                        <!-- Итоговый чек -->
                        <div class="checkout-card" id="checkout-card">
                            <div class="checkout-content">
                                <!-- СПИСОК КУРСОВ В ЧЕКЕ -->
                                <div class="checkout-courses-list" id="checkout-courses-list">
                                    <!-- Сюда будут динамически добавляться курсы -->
                                </div>
                                
                                <!-- Линия-разделитель -->
                                <div class="checkout-divider"></div>
                                
                                <!-- Итоговая цена -->
                                <div class="checkout-total">
                                    <span class="total-label">Итого:</span>
                                    <span class="total-price" id="total-price">0 ₽</span>
                                </div>
                                
                                <!-- Вопрос про промокод -->
                                <div class="checkout-promo-question">Есть промокод на скидку? Введите его для активации?</div>
                                
                                <!-- Поле для ввода промокода и кнопка "Применить" -->
                                <div class="promo-row">
                                    <div class="checkout-promo-field">
                                        <input type="text" class="promo-input" placeholder="Введите промокод для активации">
                                        <!-- Удаляем эту строку: <div class="promo-input-line"></div> -->
                                    </div>
                                    <button class="promo-apply-btn" onclick="applyPromoCode()">Применить</button>
                                </div>
                                <!-- Кнопка "Оформить заказ" -->
                                <button class="checkout-submit-btn" onclick="checkout()">Оформить заказ</button>
                            </div>
                        </div>
                    </div>
                </div>
        </section>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-content">
                    <img src="img/logo.svg" alt="Логотип" class="footer-logo">
                    
                    <nav class="footer-nav">
                        <a href="index.html" class="footer-nav-link">Главная</a>
                        <a href="about-course.html" class="footer-nav-link">О курсе</a>
                        <a href="contacts.html" class="footer-nav-link">Контакты</a>
                        <a href="reviews.html" class="footer-nav-link">Отзывы</a>
                    </nav>
                    
                    <div class="footer-social">
                        <a href="#" class="social-link">
                            <img src="img/vk.svg" alt="ВКонтакте" class="social-icon">
                        </a>
                        <a href="#" class="social-link">
                            <img src="img/tg.svg" alt="Телеграм" class="social-icon">
                        </a>
                        <a href="#" class="social-link">
                            <img src="img/ot.svg" alt="Одноклассники" class="social-icon">
                        </a>
                        <a href="#" class="social-link">
                            <img src="img/yt.svg" alt="YouTube" class="social-icon">
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="footer-line"></div>
            
            <div class="footer-bottom">
                <div class="footer-bottom-content">
                    <div class="footer-copyright">
                        ©2025 Сети и телекоммуникации. Все права защищены.
                    </div>
                    
                    <div class="footer-policy">
                        <a href="#" class="policy-link">Политика конфиденциальности</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Подключаем общий файл с логикой корзины -->
    <script src="cart.js"></script>

    <script>
       // Функция для определения активной страницы
    function setActiveNavLink() {
        document.querySelectorAll('.menu-item').forEach(link => {
            link.classList.remove('active');
        });
        
        document.querySelectorAll('.footer-nav-link').forEach(link => {
            link.classList.remove('active');
        });
    }

    // ===========================================
    // ЛОГИКА РАБОТЫ С КОРЗИНОЙ (специфичная для страницы)
    // ===========================================
    
    // Элементы DOM
    const cartItemsContainer = document.getElementById('cart-items');
    const checkoutCard = document.getElementById('checkout-card');
    const checkoutCoursesList = document.getElementById('checkout-courses-list');
    const totalPriceElement = document.getElementById('total-price');
    
    // Переменные для промокода
    let appliedPromoCode = null;
    const DISCOUNT_RATE = 0.3; // 30% скидка
    const VALID_PROMO_CODES = ['DISCOUNT30', 'STUDENT30', 'NEWYEAR30']; // Список допустимых промокодов
    
    // Функция применения промокода
    window.applyPromoCode = function() {
        const promoInput = document.querySelector('.promo-input');
        const enteredCode = promoInput.value.trim().toUpperCase();
        
        if (!enteredCode) {
            alert('Введите промокод');
            return;
        }
        
        if (VALID_PROMO_CODES.includes(enteredCode)) {
            appliedPromoCode = enteredCode;
            updateCheckout();
            // Очищаем поле ввода
            promoInput.value = '';
            // Показываем сообщение об успехе
            showPromoMessage('Промокод применен! Скидка 30%', 'success');
        } else {
            showPromoMessage('Неверный промокод', 'error');
        }
    };
    
    // Функция отображения сообщения о промокоде
    function showPromoMessage(text, type) {
        // Удаляем старое сообщение, если есть
        const oldMessage = document.querySelector('.promo-message');
        if (oldMessage) {
            oldMessage.remove();
        }
        
        // Создаем новое сообщение
        const message = document.createElement('div');
        message.className = `promo-message ${type}`;
        message.textContent = text;
        
        // Добавляем после поля ввода
        const promoRow = document.querySelector('.promo-row');
        promoRow.parentNode.insertBefore(message, promoRow.nextSibling);
        
        // Удаляем через 3 секунды
        setTimeout(() => {
            message.remove();
        }, 3000);
    }
    
    // Функция расчета суммы со скидкой
    function calculateTotalWithDiscount(cart) {
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        if (appliedPromoCode) {
            const discount = subtotal * DISCOUNT_RATE;
            return {
                subtotal: subtotal,
                discount: discount,
                total: subtotal - discount
            };
        }
        
        return {
            subtotal: subtotal,
            discount: 0,
            total: subtotal
        };
    }
    
    // Функция обновления итогового чека
    function updateCheckout() {
        const cart = getCart();
        
        if (cart.length === 0) {
            checkoutCard.style.display = 'none';
            return;
        }
        
        checkoutCard.style.display = 'block';
        
        // Рассчитываем сумму со скидкой
        const totals = calculateTotalWithDiscount(cart);
        
        // Формируем список курсов
        let coursesHtml = '';
        cart.forEach(item => {
            coursesHtml += `
                <div class="checkout-course-item">
                    <span class="checkout-course-name">${item.name}</span>
                    <div class="checkout-course-price-wrapper">
                        <span class="checkout-course-price">${item.price.toLocaleString()} ₽</span>
                        <span class="checkout-course-quantity">x${item.quantity}</span>
                    </div>
                </div>
            `;
        });
        
        checkoutCoursesList.innerHTML = coursesHtml;
        
        // Обновляем итоговую цену с учетом скидки
        if (totalPriceElement) {
            if (appliedPromoCode) {
                totalPriceElement.innerHTML = `
                    <span style="text-decoration: line-through; color: rgba(0,0,0,0.5); margin-right: 10px;">${totals.subtotal.toLocaleString()} ₽</span>
                    ${totals.total.toLocaleString()} ₽
                `;
                // Добавляем информацию о примененном промокоде
                showAppliedPromoInfo(appliedPromoCode, totals.discount);
            } else {
                totalPriceElement.textContent = `${totals.total.toLocaleString()} ₽`;
                // Удаляем информацию о промокоде, если она есть
                const promoInfo = document.querySelector('.applied-promo-info');
                if (promoInfo) {
                    promoInfo.remove();
                }
            }
        }
    }
    
    // Функция отображения информации о примененном промокоде
    function showAppliedPromoInfo(promoCode, discountAmount) {
        // Удаляем старую информацию, если есть
        const oldInfo = document.querySelector('.applied-promo-info');
        if (oldInfo) {
            oldInfo.remove();
        }
        
        // Создаем новую информацию
        const promoInfo = document.createElement('div');
        promoInfo.className = 'applied-promo-info';
        promoInfo.innerHTML = `
            <span>Промокод ${promoCode} применен</span>
            <span style="color: #44ff44;">-${discountAmount.toLocaleString()} ₽</span>
            <button class="remove-promo-btn" onclick="removePromoCode()">×</button>
        `;
        
        // Добавляем после итоговой цены
        const checkoutTotal = document.querySelector('.checkout-total');
        checkoutTotal.parentNode.insertBefore(promoInfo, checkoutTotal.nextSibling);
    }
    
    // Функция удаления промокода
    window.removePromoCode = function() {
        appliedPromoCode = null;
        updateCheckout();
    };
    
    // Функция отрисовки всех товаров
    function renderCartItems() {
        if (!cartItemsContainer) return;
        
        const cart = getCart();
        
        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            checkoutCard.style.display = 'none';
            appliedPromoCode = null; // Сбрасываем промокод при пустой корзине
            return;
        }
        
        let html = '';
        cart.forEach(item => {
            html += `
                <div class="cart-item-card">
                    <button class="cart-item-remove" onclick="removeCartItem(${item.id})">×</button>
                    <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                    <div class="cart-item-info">
                        <h3 class="cart-item-title">${item.name}</h3>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                        <div class="cart-item-quantity-block">
                            <div class="cart-item-quantity-label">Количество</div>
                            <div class="cart-item-quantity-controls">
                                <button class="quantity-btn minus-btn" onclick="decreaseQuantity(${item.id})">−</button>
                                <span class="quantity-value" id="quantity-${item.id}">${item.quantity}</span>
                                <button class="quantity-btn plus-btn" onclick="increaseQuantity(${item.id})">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        cartItemsContainer.innerHTML = html;
        updateCheckout();
    }
    
    // Функция увеличения количества
    window.increaseQuantity = function(itemId) {
        const cart = getCart();
        const item = cart.find(item => item.id === itemId);
        if (item) {
            updateQuantity(itemId, item.quantity + 1);
            document.getElementById(`quantity-${itemId}`).textContent = item.quantity + 1;
            updateAllCartCounters();
            updateCheckout();
        }
    };
    
    // Функция уменьшения количества
    window.decreaseQuantity = function(itemId) {
        const cart = getCart();
        const item = cart.find(item => item.id === itemId);
        if (item && item.quantity > 1) {
            updateQuantity(itemId, item.quantity - 1);
            document.getElementById(`quantity-${itemId}`).textContent = item.quantity - 1;
            updateAllCartCounters();
            updateCheckout();
        }
    };
    
    // Функция удаления товара
    window.removeCartItem = function(itemId) {
        removeFromCart(itemId);
        renderCartItems();
        updateAllCartCounters();
    };
    
    // Функция оформления заказа
    window.checkout = function() {
        const cart = getCart();
        
        if (cart.length === 0) {
            alert('Корзина пуста!');
            return;
        }
        
        // Очищаем корзину после оформления заказа
        clearCart();
        
        // Обновляем счетчик в хедере
        updateAllCartCounters();
        
        // Перенаправляем на страницу благодарности
        window.location.href = 'thank-you.html';
    };
    
    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        setActiveNavLink();
        renderCartItems();
        updateAllCartCounters();
        console.log('Страница корзины загружена');
    });

        document.addEventListener('DOMContentLoaded', function() {
        // Обновляем счетчик корзины при загрузке любой страницы
        if (typeof updateAllCartCounters === 'function') {
            updateAllCartCounters();
        }
    });

    // Инициализация при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    setActiveNavLink();
    renderCartItems();
    updateAllCartCounters(); // Эта строка уже должна быть
    console.log('Страница корзины загружена');
});
    </script>
</body>
</html>
