<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <title>Вход - Сети и телекоммуникации</title>
</head>
<body>
    <!-- Хедер -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <img class="logo" src="img/logo.png" alt="Логотип">
            </a>
            
            <nav class="menu">
                <a class="menu-item" href="index.html">Главная</a>
                <a class="menu-item" href="about-course.html">О курсе</a>
                <a class="menu-item" href="contacts.html">Контакты</a>
                <a class="menu-item" href="reviews.html">Отзывы</a>
            </nav>
            
            <div class="header-actions">
                <a href="register.html" class="cabinet">
                    <img class="kabinet-icon" src="img/kabinet.png" alt="Личный кабинет">
                </a>
                <a href="Korzina.html" class="cart-link">
                    <img class="cart-icon" src="img/korzina.png" alt="Корзина">
                    <span class="cart-badge" id="header-cart-counter">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="register-section">
            <div class="register-container">
                <!-- Иконка сайта -->
                <img src="img/IconSite.svg" alt="Иконка сайта" class="register-icon">
                
                <!-- Заголовок -->
                <h1 class="register-title">ВХОД</h1>
                
                <!-- Форма входа -->
                <form class="register-form" id="loginForm">
                    <!-- Поле Email/Телефон -->
                    <div class="form-group">
                        <label class="input-label">Введите email или номер телефона</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="login" 
                                name="login" 
                                class="form-input"
                                placeholder="Email или телефон"
                                required
                            >
                            <div class="error-plate" id="login-error">
                                <span class="error-text"></span>
                                <div class="error-arrow"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Поле Пароль -->
                    <div class="form-group">
                        <label class="input-label">Введите пароль</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input"
                                placeholder="Пароль"
                                required
                            >
                            <div class="error-plate" id="password-error">
                                <span class="error-text"></span>
                                <div class="error-arrow"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Кнопки - с отступом 40px как на странице регистрации -->
                    <div class="register-buttons">
                        <button type="submit" class="register-btn register-submit" id="login-submit-btn">Войти</button>
                        <a href="register.html" class="register-btn register-login">Регистрация</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-content">
                    <img src="img/logo.svg" alt="Логотип" class="footer-logo">
                    
                    <nav class="footer-nav">
                        <a href="index.html" class="footer-nav-link">Главная</a>
                        <a href="about-course.html" class="footer-nav-link">О курсе</a>
                        <a href="contacts.html" class="footer-nav-link">Контакты</a>
                        <a href="reviews.html" class="footer-nav-link">Отзывы</a>
                    </nav>
                    
                    <div class="footer-social">
                        <a href="#" class="social-link">
                            <img src="img/vk.svg" alt="ВКонтакте" class="social-icon">
                        </a>
                        <a href="#" class="social-link">
                            <img src="img/tg.svg" alt="Телеграм" class="social-icon">
                        </a>
                        <a href="#" class="social-link">
                            <img src="img/ot.svg" alt="Одноклассники" class="social-icon">
                        </a>
                        <a href="#" class="social-link">
                            <img src="img/yt.svg" alt="YouTube" class="social-icon">
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="footer-line"></div>
            
            <div class="footer-bottom">
                <div class="footer-bottom-content">
                    <div class="footer-copyright">
                        ©2025 Сети и телекоммуникации. Все права защищены.
                    </div>
                    
                    <div class="footer-policy">
                        <a href="#" class="policy-link">Политика конфиденциальности</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

<script src="cart.js"></script>
<script src="auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Обновляем счетчик корзины
        if (typeof updateAllCartCounters === 'function') {
            updateAllCartCounters();
        }
        
        // Проверяем, может пользователь уже авторизован
        if (typeof checkAuth === 'function' && checkAuth()) {
            window.location.href = 'profile.html';
            return;
        }
        
        // ===========================================
        // ВАЛИДАЦИЯ ФОРМЫ ВХОДА
        // ===========================================
        
        const form = document.getElementById('loginForm');
        if (!form) return;
        
        const loginInput = document.getElementById('login');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('login-submit-btn');
        
        // Элементы для плашек с ошибками
        const loginErrorPlate = document.getElementById('login-error');
        const passwordErrorPlate = document.getElementById('password-error');
        
        // Текстовые элементы внутри плашек
        const loginErrorText = loginErrorPlate.querySelector('.error-text');
        const passwordErrorText = passwordErrorPlate.querySelector('.error-text');
        
        // Регулярные выражения
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^[\+]?[0-9\s\-\(\)]{10,20}$/;
        
        // Функция для определения типа введенных данных
        function getLoginType(value) {
            const cleanValue = value.replace(/\s|-|\(|\)/g, '');
            
            if (emailRegex.test(value)) {
                return 'email';
            } else if (phoneRegex.test(cleanValue)) {
                return 'phone';
            } else {
                return 'unknown';
            }
        }
        
        // Функция для отображения ошибки
        function showError(inputElement, errorPlate, errorTextElement, message) {
            if (!inputElement || !errorPlate || !errorTextElement) return;
            
            inputElement.classList.add('error');
            inputElement.classList.remove('success');
            errorTextElement.textContent = message;
            
            setTimeout(() => {
                errorPlate.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                hideError(errorPlate);
            }, 5000);
        }
        
        function hideError(errorPlate) {
            if (!errorPlate) return;
            errorPlate.classList.remove('show');
        }
        
        function showSuccess(inputElement, errorPlate) {
            if (!inputElement || !errorPlate) return;
            inputElement.classList.remove('error');
            inputElement.classList.add('success');
            hideError(errorPlate);
        }
        
        // Валидация логина (email или телефон)
        function validateLogin() {
            const value = loginInput.value.trim();
            
            if (value === '') {
                showError(loginInput, loginErrorPlate, loginErrorText, 'Пожалуйста, введите email или номер телефона');
                return false;
            }
            
            const loginType = getLoginType(value);
            
            if (loginType === 'unknown') {
                showError(loginInput, loginErrorPlate, loginErrorText, 'Введите корректный email или номер телефона');
                return false;
            }
            
            showSuccess(loginInput, loginErrorPlate);
            return true;
        }
        
        // Валидация пароля
        function validatePassword() {
            const value = passwordInput.value.trim();
            
            if (value === '') {
                showError(passwordInput, passwordErrorPlate, passwordErrorText, 'Пожалуйста, введите пароль');
                return false;
            }
            
            if (value.length < 6) {
                showError(passwordInput, passwordErrorPlate, passwordErrorText, 'Пароль должен содержать минимум 6 символов');
                return false;
            }
            
            showSuccess(passwordInput, passwordErrorPlate);
            return true;
        }
        
        // Валидация всей формы
        function validateForm() {
            const isLoginValid = validateLogin();
            const isPasswordValid = validatePassword();
            
            return isLoginValid && isPasswordValid;
        }
        
        // Обработчики событий для валидации
        if (loginInput) {
            loginInput.addEventListener('blur', validateLogin);
            loginInput.addEventListener('input', function() {
                if (this.classList.contains('error')) {
                    validateLogin();
                }
            });
            loginInput.addEventListener('focus', function() {
                hideError(loginErrorPlate);
            });
        }
        
        if (passwordInput) {
            passwordInput.addEventListener('blur', validatePassword);
            passwordInput.addEventListener('input', function() {
                if (this.classList.contains('error')) {
                    validatePassword();
                }
            });
            passwordInput.addEventListener('focus', function() {
                hideError(passwordErrorPlate);
            });
        }
        
        // Обработка отправки формы
        if (form && submitBtn) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (!validateForm()) {
                    const firstError = document.querySelector('.error');
                    if (firstError) {
                        firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    return;
                }
                
                const loginValue = loginInput.value.trim();
                const loginType = getLoginType(loginValue);
                
                // В реальном проекте здесь должен быть запрос к серверу
                // Для демо используем тестовые данные
                const userData = {
                    fullname: 'Стариков Владислав Викторович',
                    email: loginType === 'email' ? loginValue : 'starikovvladislav.17@gmail.com',
                    phone: loginType === 'phone' ? loginValue : '+79505362276',
                    loggedInAt: new Date().toISOString(),
                    verifiedVia: loginType
                };
                
                // Вызываем функцию входа из auth.js
                if (typeof login === 'function') {
                    login(userData);
                    console.log('Пользователь вошел:', userData);
                }
                
                // Перенаправляем в личный кабинет
                window.location.href = 'profile.html';
            });
        }
    });
</script>
</body>
</html>
